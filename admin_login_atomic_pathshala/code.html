<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-0 overflow-x-hidden font-body-md text-body-md">
<!-- Background Layer with Blur -->

<div class="fixed inset-0 bg-primary/10 backdrop-blur-sm z-0"></div>
<main class="relative z-10 w-full max-w-[480px] animate-in fade-in zoom-in duration-500">
<div class="glass-card shadow-2xl rounded-xl p-stack-lg flex flex-col items-center">
<!-- Brand Identity -->
<div class="w-full mb-stack-lg flex justify-center">
<img alt="Atomic Pathshala Logo" class="h-12 md:h-14 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpuZebcDDUgtn-6u5QUGYy92vqiTsISsoyS0kzsKdMDnDrKrZKTjdRTI-zcgcCyY3cXvbqw3ZEUI4bDyXpdgcvhYLZWrvxOSatMFsM7XQqlr5Nv7mjs3CT7MbngaVOoFLbJjlQw8I0Pq-Wk-v5xG6lrviB1c3Osy7hKm7VERpMhtQhLrGgm1KSjzX06mkIu3ZyKroW8ZhxTB1Fcn5lo9GIRe2ok_zkK85yVtjxTI0QCHebmz8OeupCWbzInE7nkwH-XK0_ShjXojM"/>

<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight mb-2">Admin Portal</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back. Please log in to manage the academic system.</p>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-gutter">
<!-- Username/Email Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="admin-id">Admin ID or Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full h-12 pl-11 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 input-focus-ring transition-all" id="admin-id" name="admin-id" placeholder="e.g. admin@atomic.edu" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-12 pl-11 pr-11 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Helpers -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface">Remember Me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary-container text-on-primary font-headline-md text-headline-md rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[24px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant/30 w-full text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    New staff member? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="#">Register here</a>
</p>
</div>
</div>
<!-- System Status Bar (Subtle) -->
<div class="mt-stack-md flex justify-center gap-6 text-white/60 font-label-sm text-label-sm">

<span class="w-2 h-2 bg-tertiary-fixed-dim rounded-full animate-pulse"></span>
                System Operational

<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
                SSL Encrypted
            </div>
</div>
</main>
<!-- Visual Polish: Floating Particles (JS) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.body;
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'fixed bg-white/10 rounded-full pointer-events-none z-0';
                const size = Math.random() * 40 + 10;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.top = `${Math.random() * 100}vh`;
                particle.style.filter = 'blur(4px)';
                
                // Random drift animation
                const duration = Math.random() * 10 + 20;
                particle.animate([
                    { transform: 'translate(0, 0) rotate(0deg)' },
                    { transform: `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) rotate(360deg)` }
                ], {
                    duration: duration * 1000,
                    iterations: Infinity,
                    direction: 'alternate',
                    easing: 'ease-in-out'
                });
                
                container.appendChild(particle);
            }
        });
    </script>
</body></html>
