<script>
        // Micro-interaction for OTP input auto-focus
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                } else if (e.key === 'Backspace') {
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                }
            });
        });

        function showOtpSection() {
            const identifier = document.getElementById('identifier').value;
            if (!identifier) {
                alert('Please enter a mobile number or email');
                return;
            }

            const otpSection = document.getElementById('otpSection');
            const requestForm = document.getElementById('requestForm');
            
            // Visual feedback
            requestForm.classList.add('opacity-50', 'pointer-events-none', 'scale-95');
            otpSection.classList.remove('hidden');
            setTimeout(() => {
                otpSection.classList.add('opacity-100');
                inputs[0].focus();
            }, 50);
        }

        function handleVerification() {
            const otp = Array.from(inputs).map(i => i.value).join('');
            if (otp.length < 6) {
                alert('Please enter the full 6-digit code');
                return;
            }
            
            // Mock success transition
            const btn = event.currentTarget;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Verifying...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Verified';
                btn.classList.replace('bg-secondary-container', 'bg-tertiary-container');
                btn.classList.add('text-on-tertiary-container');
                
                // Final success animation would lead to next setup step
                setTimeout(() => {
                    alert('Identity verified! Proceeding to account setup.');
                }, 500);
            }, 1500);
        }

        function resendOtp() {
            alert('A new OTP has been sent to your registered device.');
            inputs.forEach(i => i.value = '');
            inputs[0].focus();
        }
    </script>
